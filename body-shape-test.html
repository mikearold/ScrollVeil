<!DOCTYPE html>
<html>
<head>
  <title>ScrollVeil Body Shape Detection Test - 100+ Cases</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { color: #00d4ff; margin-bottom: 10px; }
    h2 { color: #aaa; font-size: 14px; font-weight: normal; margin-bottom: 20px; }

    .controls {
      background: #16213e; padding: 15px; border-radius: 8px; margin-bottom: 20px;
      display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
    }
    .controls button {
      background: #00d4ff; color: #000; border: none; padding: 8px 16px;
      border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px;
    }
    .controls button:hover { background: #00b8d9; }

    .summary {
      background: #16213e; padding: 15px; border-radius: 8px; margin-bottom: 20px;
      display: none;
    }
    .summary.visible { display: block; }
    .summary-stats { display: flex; gap: 30px; flex-wrap: wrap; }
    .summary-stat { text-align: center; }
    .summary-stat .num { font-size: 28px; font-weight: bold; }
    .summary-stat .lbl { font-size: 12px; color: #888; }
    .summary-stat.correct .num { color: #2ecc71; }
    .summary-stat.incorrect .num { color: #e74c3c; }
    .summary-stat.allowed .num { color: #2ecc71; }
    .summary-stat.blurred .num { color: #f39c12; }
    .summary-stat.blocked .num { color: #e74c3c; }

    .results-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .result-card {
      background: #16213e; border-radius: 8px; overflow: hidden; border: 2px solid #333;
    }
    .result-card.correct { border-color: #2ecc71; }
    .result-card.incorrect { border-color: #e74c3c; }

    .result-card .image-container {
      width: 100%; height: 150px; overflow: hidden; background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    .result-card .image-container canvas {
      max-width: 100%; max-height: 150px; object-fit: contain;
    }

    .result-card .info { padding: 8px; font-size: 11px; }
    .result-card .name { font-size: 11px; color: #ccc; margin-bottom: 4px; font-weight: bold; }
    .result-card .score { color: #00d4ff; margin-bottom: 2px; }
    .result-card .decision { font-size: 10px; margin-bottom: 2px; }
    .result-card .decision.correct { color: #2ecc71; }
    .result-card .decision.incorrect { color: #e74c3c; }
    .result-card .expected { font-size: 10px; color: #888; margin-bottom: 2px; }
    .result-card .reason { font-size: 9px; color: #f39c12; font-style: italic; }

    let detector = null;
    
    function initDetector() {
      if (typeof ScrollVeilDetector !== 'undefined') {
        detector = new ScrollVeilDetector('strict');
        console.log('Detector initialized');
      } else {
        console.error('ScrollVeilDetector not found!');
      }
    }
    
    // Initialize on page load
    window.addEventListener('DOMContentLoaded', initDetector);
    // Also try immediately in case DOMContentLoaded already fired
    if (document.readyState === 'loading') {
      // Still loading
    } else {
      // Already loaded
      initDetector();
    }

    // Generate synthetic body shape test cases
    function generateBodyShape(config) {
      const canvas = document.createElement('canvas');
      canvas.width = 299;
      canvas.height = 299;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = config.bgColor || '#333333';
      ctx.fillRect(0, 0, 299, 299);

      // Body color (can be any color - blue alien, green orc, etc.)
      const bodyColor = config.bodyColor || '#E8BEAC';

      // Draw body based on pose
      switch(config.pose) {
        case 'standing_front':
          // Head
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(150, 60, 25, 0, Math.PI * 2);
          ctx.fill();

          // Torso (rectangle)
          ctx.fillRect(120, 85, 60, 90);

          // Arms
          ctx.fillRect(90, 100, 30, 60); // Left arm
          ctx.fillRect(180, 100, 30, 60); // Right arm

          // Legs
          ctx.fillRect(125, 175, 20, 80); // Left leg
          ctx.fillRect(155, 175, 20, 80); // Right leg
          break;

        case 'standing_side':
          // Head (side profile)
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(150, 60, 25, 0, Math.PI * 2);
          ctx.fill();

          // Torso (narrower from side)
          ctx.fillRect(135, 85, 30, 90);

          // One arm visible
          ctx.fillRect(165, 100, 15, 60);

          // Legs (one in front)
          ctx.fillRect(140, 175, 15, 80);
          ctx.fillRect(155, 175, 15, 80);
          break;

        case 'sitting':
          // Head
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(150, 80, 25, 0, Math.PI * 2);
          ctx.fill();

          // Torso (shorter, sitting)
          ctx.fillRect(120, 105, 60, 70);

          // Arms
          ctx.fillRect(90, 120, 30, 50);
          ctx.fillRect(180, 120, 30, 50);

          // Legs (bent, horizontal)
          ctx.fillRect(120, 175, 30, 20); // Left thigh
          ctx.fillRect(160, 175, 30, 20); // Right thigh
          ctx.fillRect(115, 195, 20, 50); // Left lower leg
          ctx.fillRect(165, 195, 20, 50); // Right lower leg
          break;

        case 'arms_up':
          // Head
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(150, 60, 25, 0, Math.PI * 2);
          ctx.fill();

          // Torso
          ctx.fillRect(120, 85, 60, 90);

          // Arms raised
          ctx.fillRect(90, 50, 30, 60); // Left arm up
          ctx.fillRect(180, 50, 30, 60); // Right arm up

          // Legs
          ctx.fillRect(125, 175, 20, 80);
          ctx.fillRect(155, 175, 20, 80);
          break;

        case 'walking':
          // Head
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(150, 60, 25, 0, Math.PI * 2);
          ctx.fill();

          // Torso
          ctx.fillRect(120, 85, 60, 90);

          // Arms (one forward, one back)
          ctx.fillRect(85, 100, 35, 60); // Left arm forward
          ctx.fillRect(180, 110, 30, 55); // Right arm back

          // Legs (one forward, one back)
          ctx.fillRect(120, 175, 20, 80); // Left leg forward
          ctx.fillRect(160, 180, 20, 75); // Right leg back
          break;

        case 'crouching':
          // Head
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(150, 100, 25, 0, Math.PI * 2);
          ctx.fill();

          // Torso (compressed)
          ctx.fillRect(120, 125, 60, 50);

          // Arms
          ctx.fillRect(90, 135, 30, 45);
          ctx.fillRect(180, 135, 30, 45);

          // Legs (bent, compact)
          ctx.fillRect(120, 175, 25, 40);
          ctx.fillRect(155, 175, 25, 40);
          ctx.fillRect(115, 215, 30, 50);
          ctx.fillRect(155, 215, 30, 50);
          break;

        case 'lying_down':
          // Head
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(80, 150, 25, 0, Math.PI * 2);
          ctx.fill();

          // Torso (horizontal)
          ctx.fillRect(105, 135, 100, 30);

          // Arms
          ctx.fillRect(105, 105, 50, 15);
          ctx.fillRect(155, 105, 50, 15);

          // Legs (horizontal)
          ctx.fillRect(205, 140, 70, 10);
          ctx.fillRect(205, 155, 70, 10);
          break;

        case 'partial_headshot':
          // Just head and shoulders
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(150, 120, 50, 0, Math.PI * 2);
          ctx.fill();

          // Shoulders
          ctx.fillRect(90, 170, 120, 40);
          break;

        case 'tiny_figure':
          // Small figure (like in distance)
          const scale = 0.3;
          ctx.fillStyle = bodyColor;
          // Head
          ctx.beginPath();
          ctx.arc(150, 150, 10 * scale, 0, Math.PI * 2);
          ctx.fill();
          // Body
          ctx.fillRect(150 - 8*scale, 150 + 10*scale, 16*scale, 30*scale);
          // Legs
          ctx.fillRect(150 - 6*scale, 150 + 40*scale, 5*scale, 20*scale);
          ctx.fillRect(150 + 1*scale, 150 + 40*scale, 5*scale, 20*scale);
          break;
      }

      return { canvas, name: config.name, expected: config.expected };
    }

          ctx.beginPath();

          ctx.fill(); // Bottle cap
          ctx.fillRect(140, 75, 20, 150); // Bottle body
          ctx.fillRect(135, 225, 30, 40); // Bottle base
          break;

        case 'lamp':
          ctx.fillStyle = '#F5F5DC'; // Beige background
          ctx.fillRect(0, 0, 299, 299);
          ctx.fillStyle = '#D4AF37'; // Gold lampshade
          ctx.beginPath();
          ctx.moveTo(100, 80);
          ctx.lineTo(200, 80);
          ctx.lineTo(180, 130);
          ctx.lineTo(120, 130);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#8B7355'; // Brown pole
          ctx.fillRect(145, 130, 10, 120);
          ctx.fillStyle = '#4A4A4A'; // Gray base
          ctx.fillRect(120, 250, 60, 20);
          break;

        case 'vase':
          ctx.fillStyle = '#E8D5C4'; // Tan background
          ctx.fillRect(0, 0, 299, 299);
          ctx.fillStyle = '#8B4513'; // Brown vase
          ctx.beginPath();
          ctx.arc(150, 70, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillRect(140, 90, 20, 80);
          ctx.beginPath();
          ctx.moveTo(135, 170);
          ctx.lineTo(165, 170);
          ctx.lineTo(155, 200);
          ctx.lineTo(145, 200);
          ctx.closePath();
          ctx.fill();
          break;

        case 'microphone':
          ctx.fillStyle = '#2C2C2C'; // Dark background
          ctx.fillRect(0, 0, 299, 299);
          ctx.fillStyle = '#C0C0C0'; // Silver mic
          ctx.beginPath();
          ctx.arc(150, 70, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillRect(145, 90, 10, 120);
          ctx.beginPath();
          ctx.arc(150, 210, 30, 0, Math.PI);
          ctx.fill();
          break;

        case 'guitar':
          ctx.fillStyle = '#F5F5DC'; // Beige background
          ctx.fillRect(0, 0, 299, 299);
          ctx.fillStyle = '#8B4513'; // Brown guitar
          // Body
          ctx.beginPath();
          ctx.arc(150, 180, 50, 0, Math.PI * 2);
          ctx.fill();
          // Neck
          ctx.fillRect(145, 50, 10, 130);
          // Head
          ctx.fillRect(140, 30, 20, 20);
          break;

        case 'candle':
          ctx.fillStyle = '#4A4A4A';
          ctx.fillRect(0, 0, 299, 299);
          ctx.fillStyle = '#FFD700'; // Yellow flame
          ctx.beginPath();
          ctx.moveTo(150, 50);
          ctx.lineTo(145, 70);
          ctx.lineTo(155, 70);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#FFF8DC'; // Cream candle
          ctx.fillRect(140, 70, 20, 150);
          break;

        case 'pillar':
          ctx.fillStyle = '#D2B48C'; // Tan background
          ctx.fillRect(0, 0, 299, 299);
          ctx.fillStyle = '#F5F5DC'; // Light stone
          ctx.fillRect(125, 0, 50, 299);
          // Add some horizontal lines for stone texture
          ctx.fillStyle = '#E8D5C4';
          for (let i = 0; i < 10; i++) {
            ctx.fillRect(125, i * 30, 50, 2);
          }
          break;

        case 'baseball_bat':
          ctx.fillStyle = '#228B22'; // Green grass background
          ctx.fillRect(0, 0, 299, 299);
          ctx.fillStyle = '#8B4513'; // Brown bat
          // Handle
          ctx.fillRect(145, 50, 10, 150);
          // Barrel (wider)
          ctx.fillRect(140, 200, 20, 70);
          break;
      }

      return { canvas, name: config.name, expected: config.expected };
    }

    async function analyzeCanvas(canvas, name, expected) {
      if (!detector) {
        console.error('Detector not initialized! Call initDetector() first.');
        return;
      }
      
      const img = new Image();
      img.src = canvas.toDataURL();
      await new Promise(r => img.onload = r);
      img.width = canvas.width;
      img.height = canvas.height;

      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, 299, 299);
      const pixels = imageData.data;

      const skinAnalysis = detector.analyzePixels(pixels, 299, 299);
      const edgeAnalysis = detector.analyzeEdges(pixels, 299, 299);
      const colorAnalysis = detector.analyzeColorProfile(pixels, 299, 299);
      const textureAnalysis = detector.analyzeTexture(pixels, 299, 299);

      const combinedAnalysis = {
        ...skinAnalysis,
        ...edgeAnalysis,
        ...colorAnalysis,
        ...textureAnalysis
      };

      const score = detector.calculateScore(combinedAnalysis, false);
      const threshold = detector.thresholds[detector.mode];

      let decision, action;
      if (score >= threshold.block) { decision = 'BLOCKED'; action = 'block'; }
      else if (score >= threshold.blur) { decision = 'BLURRED'; action = 'blur'; }
      else { decision = 'ALLOWED'; action = 'allow'; }

      const isCorrect = decision === expected;
      const reason = combinedAnalysis.reason || 'No reason provided';

      addResultCard({
        canvas, name, score, decision, action, expected, isCorrect, reason
      });
    }

    function addResultCard(data) {
      const grid = document.getElementById('results');
      const card = document.createElement('div');
      card.className = `result-card ${data.isCorrect ? 'correct' : 'incorrect'}`;

      card.innerHTML = `
        <div class="image-container"></div>
        <div class="info">
          <div class="name">${data.isCorrect ? '✅' : '❌'} ${data.name}</div>
          <div class="score">Score: ${data.score}%</div>
          <div class="decision ${data.isCorrect ? 'correct' : 'incorrect'}">${data.decision}</div>
          <div class="expected">Expected: ${data.expected}</div>
          <div class="reason">Reason: ${data.reason}</div>
        </div>
      `;

      const container = card.querySelector('.image-container');
      container.appendChild(data.canvas);

      grid.appendChild(card);
      updateSummary();
    }

    function updateSummary() {
      const cards = document.querySelectorAll('.result-card');
      let correct = 0, incorrect = 0;
      let allowed = 0, blurred = 0, blocked = 0;

      cards.forEach(card => {
        if (card.classList.contains('correct')) correct++;
        else incorrect++;

        const decision = card.querySelector('.decision').textContent;
        if (decision.includes('ALLOWED')) allowed++;
        else if (decision.includes('BLURRED')) blurred++;
        else if (decision.includes('BLOCKED')) blocked++;
      });

      const total = correct + incorrect;
      const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

      document.getElementById('correctCount').textContent = correct;
      document.getElementById('incorrectCount').textContent = incorrect;
      document.getElementById('accuracyPct').textContent = accuracy + '%';
      document.getElementById('allowedCount').textContent = allowed;
      document.getElementById('blurredCount').textContent = blurred;
      document.getElementById('blockedCount').textContent = blocked;
      document.getElementById('summary').classList.add('visible');
    }
