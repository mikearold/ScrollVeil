<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* ═══ CSS Custom Properties for Theming ═══ */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-status: #e8f5e9;
      --text-primary: #333333;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border-color: #dddddd;
      --input-bg: #ffffff;
      --input-border: #cccccc;
      --btn-primary-bg: #4CAF50;
      --btn-primary-hover: #45a049;
      --btn-secondary-bg: #f5f5f5;
      --btn-secondary-hover: #e8e8e8;
      --btn-secondary-text: #333333;
      --btn-danger-bg: #ff5252;
      --btn-danger-hover: #e04848;
      --btn-report-bg: #FF9800;
      --btn-report-hover: #F57C00;
      --shadow-light: rgba(0,0,0,0.08);
      --slider-track: #ddd;
      --slider-thumb: #4CAF50;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a2e;
        --bg-secondary: #16213e;
        --bg-status: #1b3a26;
        --text-primary: #e0e0e0;
        --text-secondary: #aaaaaa;
        --text-muted: #777777;
        --border-color: #333355;
        --input-bg: #16213e;
        --input-border: #444466;
        --btn-primary-bg: #4CAF50;
        --btn-primary-hover: #66BB6A;
        --btn-secondary-bg: #2a2a4a;
        --btn-secondary-hover: #3a3a5a;
        --btn-secondary-text: #cccccc;
        --btn-danger-bg: #ff5252;
        --btn-danger-hover: #ff6e6e;
        --btn-report-bg: #FF9800;
        --btn-report-hover: #FFB74D;
        --shadow-light: rgba(0,0,0,0.3);
        --slider-track: #444466;
        --slider-thumb: #66BB6A;
      }
    }

    /* ═══ Base Styles ═══ */
    * { box-sizing: border-box; }

    body {
      width: 320px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
    }

    /* ═══ Header ═══ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
      color: var(--text-primary);
    }
    .header .version {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ═══ Status Toggle Button ═══ */
    .status-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg-status);
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #4CAF50;
      text-align: center;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      user-select: none;
    }
    .status-toggle:hover {
      border-color: #4CAF50;
    }
    .status-toggle.disabled {
      background: #3a1a1a;
      color: #ff5252;
      border-color: transparent;
    }
    .status-toggle.disabled:hover {
      border-color: #ff5252;
    }
    @media (prefers-color-scheme: light) {
      .status-toggle.disabled {
        background: #fce4e4;
      }
    }

    /* ═══ Section Styling ═══ */
    .section {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }
    .section:last-of-type {
      border-bottom: none;
      margin-bottom: 6px;
    }
    .section-title {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    /* ═══ Labels & Inputs ═══ */
    label {
      display: block;
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .label-bold {
      font-weight: 600;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Sliders */
    input[type="range"] {
      width: 100%;
      margin: 4px 0;
      accent-color: var(--slider-thumb);
    }

    /* Selects */
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 13px;
      background: var(--input-bg);
      color: var(--text-primary);
    }

    /* Textareas */
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 12px;
      background: var(--input-bg);
      color: var(--text-primary);
      resize: vertical;
      font-family: inherit;
    }
    textarea::placeholder {
      color: var(--text-muted);
    }

    /* ═══ Buttons ═══ */
    .btn {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-primary {
      background: var(--btn-primary-bg);
      color: #ffffff;
    }
    .btn-primary:hover { background: var(--btn-primary-hover); }

    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-text);
      border: 1px solid var(--border-color);
    }
    .btn-secondary:hover { background: var(--btn-secondary-hover); }

    .btn-report {
      background: var(--btn-report-bg);
      color: #ffffff;
    }
    .btn-report:hover { background: var(--btn-report-hover); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-row .btn { flex: 1; }

    /* ═══ Report Form ═══ */
    .report-form {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: var(--bg-secondary);
      border-radius: 6px;
      border: 1px solid var(--border-color);
    }
    .report-form.open { display: block; }
    .report-form label { margin-top: 8px; }
    .report-type-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .report-type-btn {
      flex: 1;
      padding: 6px 4px;
      font-size: 11px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .report-type-btn.active {
      background: var(--btn-report-bg);
      color: #fff;
      border-color: var(--btn-report-bg);
    }

    /* ═══ Slider with value display ═══ */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] { flex: 1; }
    .slider-value {
      min-width: 45px;
      font-weight: 600;
      font-size: 13px;
      text-align: right;
    }

    /* ═══ Collapsible Section ═══ */
    .section-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .section-toggle:hover {
      opacity: 0.8;
    }
    .toggle-arrow {
      font-size: 12px;
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }
    .toggle-arrow.open {
      transform: rotate(90deg);
    }
    .collapsible-content {
      display: none;
      margin-top: 6px;
    }
    .collapsible-content.open {
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══ Header ═══ -->
  <div class="header">
    <h1>🛡️ ScrollVeil</h1>
    <span class="version">v1.0</span>
  </div>

  <div class="status-toggle" id="statusToggle">
    <span id="statusIcon">✓</span>
    <span id="statusText">Protection Active</span>
  </div>

  <!-- ═══ Blur Strength ═══ -->
  <div class="section">
    <label class="label-bold">Blur Strength</label>
    <div class="slider-row">
      <input type="range" id="blurStrength" min="1" max="100" value="100" step="1">
      <span class="slider-value" id="blurValue">100px</span>
    </div>
  </div>

  <!-- ═══ Auto-Unblur Threshold ═══ -->
  <div class="section">
    <label class="label-bold">Auto-unblur below this risk level</label>
    <div class="slider-row">
      <input type="range" id="autoUnblurSlider" min="0" max="100" step="5" value="0">
      <span class="slider-value" id="autoValue">0%</span>
    </div>
    <div class="hint">0% = manual only · 100% = auto-unblur everything</div>
  </div>

  <!-- ═══ Video Analysis Settings ═══ -->
  <div class="section">
    <div class="section-toggle" id="videoToggle">
      <label class="label-bold" style="margin-bottom:0; cursor:pointer;">🎬 Video Analysis</label>
      <span class="toggle-arrow" id="videoArrow">▸</span>
    </div>
    <div class="collapsible-content" id="videoContent">

    <label for="videoInterval" style="margin-top:6px;">Frame interval</label>
    <select id="videoInterval">
      <option value="1">Every 1 second (most accurate)</option>
      <option value="2">Every 2 seconds</option>
      <option value="3" selected>Every 3 seconds (recommended)</option>
      <option value="5">Every 5 seconds (fastest)</option>
    </select>

    <label for="videoDuration" style="margin-top:8px;">Analysis duration</label>
    <select id="videoDuration">
      <option value="10">Quick (10 seconds)</option>
      <option value="30" selected>Standard (30 seconds)</option>
      <option value="60">Thorough (60 seconds)</option>
      <option value="0">Full video</option>
    </select>

    <label for="earlyExitSlider" style="margin-top:8px;">
      Early exit threshold
    </label>
    <div class="slider-row">
      <input type="range" id="earlyExitSlider" min="0" max="100" value="75" step="5">
      <span class="slider-value" id="earlyExitValue">75%</span>
    </div>
    <div class="hint">Stop analyzing if risk exceeds this level. 0% = never stop early.</div>

    </div><!-- end collapsible-content -->
  </div>

  <!-- ═══ Action Buttons ═══ -->
  <div class="btn-row">
    <button class="btn btn-primary" id="saveBtn">Save Settings</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" id="restoreBtn">Restore Defaults</button>
  </div>

  <!-- ═══ Report Bug Section ═══ -->
  <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color);">
    <button class="btn btn-report" id="reportToggleBtn">🐛 Report Bug / False Positive</button>

    <div class="report-form" id="reportForm">
      <label class="label-bold" style="margin-top:0;">What kind of report?</label>
      <div class="report-type-row">
        <button class="report-type-btn active" data-type="false-positive">False Positive</button>
        <button class="report-type-btn" data-type="false-negative">False Negative</button>
        <button class="report-type-btn" data-type="bug">Bug</button>
      </div>

      <label>Page URL</label>
      <input type="text" id="reportUrl" readonly
        style="width:100%; padding:6px 8px; border:1px solid var(--input-border);
        border-radius:4px; font-size:12px; background:var(--bg-secondary);
        color:var(--text-secondary); margin-bottom:6px;">

      <label>Description (optional)</label>
      <textarea id="reportDescription" rows="3"
        placeholder="Describe what happened... e.g. 'This image was blurred but it's just a landscape photo'"></textarea>

      <label style="margin-top:6px;">Detection details</label>
      <textarea id="reportDetails" rows="3" readonly
        style="font-size:11px; background:var(--bg-secondary); color:var(--text-muted);"></textarea>

      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-secondary" id="reportCancelBtn">Cancel</button>
        <button class="btn btn-report" id="reportSendBtn">Send Report</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
